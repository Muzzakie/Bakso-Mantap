<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Galeri — Bakso Mantap</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
    --kuah:#8B2E1F;
    --kuah-tua:#5E1F15;
    --sambal:#D94F30;
    --kuning:#E8A93D;
    --kuning-muda:#F3D9A4;
    --krim:#FBF3E7;
    --daun:#5B7C4B;
    --gelap:#33201A;
    --putih:#FFFFFF;
    --bayang: 0 10px 24px rgba(51,32,26,0.14);
}
*{ box-sizing:border-box; }
body{
    margin:0;
    font-family:'Nunito Sans', Arial, sans-serif;
    background:
        radial-gradient(circle at 8% 12%, rgba(232,169,61,0.12) 0, transparent 45%),
        radial-gradient(circle at 92% 30%, rgba(139,46,31,0.08) 0, transparent 40%),
        var(--krim);
    color:var(--gelap);
    line-height:1.7;
}
h1,h2,h3,.brand{ font-family:'Fredoka', Arial, sans-serif; font-weight:600; letter-spacing:0.3px; }

header.top{
    background:linear-gradient(135deg, var(--kuah-tua), var(--kuah) 60%, var(--sambal));
    color:var(--krim);
    padding:44px 20px 70px;
    text-align:center;
    position:relative;
    overflow:hidden;
}
header.top::before{
    content:"";
    position:absolute; inset:0;
    background-image:radial-gradient(rgba(255,255,255,0.10) 2px, transparent 2px);
    background-size:26px 26px;
    opacity:0.5;
}
header.top .isi{ position:relative; z-index:1; }
.badge-sejak{
    display:inline-block;
    background:rgba(255,255,255,0.16);
    border:1px solid rgba(255,255,255,0.4);
    color:var(--krim);
    font-size:0.75rem;
    font-weight:700;
    letter-spacing:1.5px;
    padding:5px 14px;
    border-radius:999px;
    margin-bottom:12px;
}
header.top .brand{
    font-size:clamp(2rem, 5vw, 3rem);
    margin:0;
    display:inline-flex;
    align-items:center;
    gap:14px;
    text-shadow:0 3px 0 rgba(0,0,0,0.15);
}
header.top .tagline{
    margin:10px 0 0;
    color:var(--kuning);
    font-weight:700;
    letter-spacing:1.5px;
    font-size:0.95rem;
}
.gelombang{
    position:relative;
    display:block;
    margin-top:-4px;
    line-height:0;
}
.steam{ animation:naik 3s ease-in-out infinite; transform-origin:center bottom; }
.steam.s2{ animation-delay:0.6s; }
.steam.s3{ animation-delay:1.2s; }
@keyframes naik{
    0%{ transform:translateY(0) scaleY(1); opacity:0.85; }
    50%{ transform:translateY(-7px) scaleY(1.1); opacity:0.35; }
    100%{ transform:translateY(0) scaleY(1); opacity:0.85; }
}
@media (prefers-reduced-motion: reduce){ .steam{ animation:none; } }

.menu{
    background:var(--gelap);
    text-align:center;
    padding:14px;
    position:sticky;
    top:0;
    z-index:10;
    box-shadow:0 4px 14px rgba(0,0,0,0.15);
}
.menu a{
    color:var(--krim);
    text-decoration:none;
    padding:12px 24px;
    border-radius:999px;
    font-weight:700;
    font-size:0.95rem;
    transition:0.25s;
    position:relative;
}
.menu a:hover, .menu a.aktif{ background:var(--sambal); color:var(--putih); }

.container, .content{
    width:88%;
    max-width:1000px;
    margin:0 auto;
    padding:40px 0 10px;
}

#judul, h2{
    color:var(--kuah);
    display:inline-block;
    margin-top:40px;
    position:relative;
    padding-bottom:8px;
}
#judul::after, h2::after{
    content:"";
    position:absolute;
    left:0; bottom:0;
    width:60%;
    height:4px;
    background:var(--kuning);
    border-radius:4px;
}
.eyebrow{
    display:block;
    color:var(--sambal);
    font-weight:800;
    letter-spacing:2px;
    font-size:0.78rem;
    text-transform:uppercase;
    margin-top:34px;
}
.highlight{ color:var(--sambal); font-weight:700; }

.hero{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:40px;
    flex-wrap:wrap;
    padding:36px 0 14px;
    text-align:left;
    margin-top:-40px;
}
.hero .teks{ max-width:440px; }
.hero h2{ font-size:clamp(1.7rem,4vw,2.4rem); margin-top:0; }
.hero h2::after{ display:none; }
.hero p{ font-size:1.05rem; }
.tombol{
    display:inline-block;
    margin-top:14px;
    background:var(--sambal);
    color:var(--putih);
    text-decoration:none;
    font-weight:700;
    padding:14px 30px;
    border-radius:999px;
    box-shadow:var(--bayang);
    transition:0.25s;
}
.tombol:hover{ background:var(--kuah); transform:translateY(-3px); box-shadow:0 14px 26px rgba(51,32,26,0.22); }
.tombol.kedua{
    background:transparent;
    color:var(--kuah);
    border:2px solid var(--kuah);
    box-shadow:none;
    margin-left:10px;
}
.tombol.kedua:hover{ background:var(--kuah); color:var(--putih); }

.grid-menu{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(220px,1fr));
    gap:24px;
    margin:26px 0 10px;
}
.kartu{
    background:var(--putih);
    border-radius:20px;
    padding:26px 20px 22px;
    text-align:center;
    box-shadow:var(--bayang);
    position:relative;
    transition:0.25s;
    border:2px solid transparent;
}
.kartu:hover{ transform:translateY(-6px); border-color:var(--kuning); }
.kartu .ikon{
    width:64px; height:64px;
    margin:0 auto 12px;
    border-radius:50%;
    background:linear-gradient(135deg, var(--kuning-muda), var(--kuning));
    display:flex; align-items:center; justify-content:center;
    font-size:1.8rem;
    box-shadow:inset 0 0 0 4px rgba(255,255,255,0.5);
}
.kartu h3{ margin:6px 0 4px; color:var(--kuah); }
.kartu p{ font-size:0.92rem; margin:0 0 10px; color:#5a463c; }
.kartu .harga{
    display:inline-block;
    color:var(--putih);
    background:var(--daun);
    font-weight:800;
    font-size:0.95rem;
    padding:5px 16px;
    border-radius:999px;
}
.tag-favorit{
    position:absolute;
    top:-10px; right:14px;
    background:var(--sambal);
    color:var(--putih);
    font-size:0.68rem;
    font-weight:800;
    letter-spacing:0.5px;
    padding:4px 10px;
    border-radius:999px;
    box-shadow:0 4px 10px rgba(217,79,48,0.4);
}

.info-box{
    background:linear-gradient(135deg, var(--kuning-muda), var(--kuning));
    border-radius:22px;
    padding:26px 30px;
    margin:30px 0;
    position:relative;
    overflow:hidden;
}
.info-box h3{ margin-top:0; color:var(--kuah-tua); }
.info-list{
    list-style:none; padding:0; margin:0;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(210px,1fr));
    gap:14px;
}
.info-list li{
    background:rgba(255,255,255,0.6);
    border-radius:14px;
    padding:12px 16px;
    font-weight:700;
    box-shadow:0 4px 10px rgba(139,46,31,0.08);
}

.testimoni{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:20px;
    margin:26px 0 10px;
}
.testi-kartu{
    background:var(--putih);
    border-radius:18px;
    padding:22px;
    box-shadow:var(--bayang);
    position:relative;
}
.testi-kartu .kutip{
    font-size:2rem;
    color:var(--kuning);
    font-family:Georgia, serif;
    line-height:0;
    display:block;
    margin-bottom:6px;
}
.testi-kartu p{ margin:0 0 10px; font-style:italic; color:#5a463c; }
.testi-kartu .nama{ font-weight:800; color:var(--kuah); font-style:normal; }

.formulir{
    margin:32px 0;
    background:var(--putih);
    border-radius:22px;
    padding:28px;
    box-shadow:var(--bayang);
    border-top:6px solid var(--sambal);
}
.formulir h3{ margin-top:0; color:var(--kuah); }
.formulir label{ font-weight:700; display:block; margin-bottom:6px; }
.formulir input, .formulir select, .formulir textarea{
    width:100%;
    padding:12px 14px;
    border:2px solid #EAD9BE;
    border-radius:12px;
    margin-bottom:18px;
    font-family:inherit;
    font-size:1rem;
    background:var(--krim);
    transition:0.2s;
}
.formulir input:focus, .formulir select:focus, .formulir textarea:focus{
    outline:none;
    border-color:var(--sambal);
    box-shadow:0 0 0 4px rgba(217,79,48,0.15);
}
.formulir input[type=submit]{
    width:auto;
    background:var(--sambal);
    color:var(--putih);
    border:none;
    font-weight:700;
    padding:13px 32px;
    border-radius:999px;
    cursor:pointer;
    transition:0.25s;
}
.formulir input[type=submit]:hover{ background:var(--kuah); transform:translateY(-2px); }

.gallery{ display:grid; grid-template-columns:repeat(auto-fit, minmax(260px, 1fr)); gap:22px; margin:22px 0 10px; }
.gallery figure{
    margin:0;
    background:var(--putih);
    padding:10px 10px 16px;
    border-radius:16px;
    box-shadow:var(--bayang);
    width:100%;
    transition:0.25s;
}
.gallery figure:hover{ transform:translateY(-5px); }
.gallery img{ width:100%; height:200px; object-fit:cover; border-radius:12px; display:block; }
.gallery figcaption{ text-align:center; margin-top:10px; font-weight:700; color:var(--kuah); }

table.data{ width:100%; border-collapse:collapse; margin-bottom:32px; border-radius:14px; overflow:hidden; box-shadow:var(--bayang); }
table.data th, table.data td{ padding:14px 16px; border-bottom:1px solid #EAD9BE; text-align:left; }
table.data th{ background:var(--kuah); color:var(--krim); }
table.data tr:nth-child(even){ background:#FBF0DE; }
.kontak-info td{ padding:12px 16px; }
.kontak-info td:first-child{ color:var(--kuah); width:150px; font-weight:700; }

footer.bawah{
    clear:both;
    background:var(--gelap);
    color:var(--krim);
    text-align:center;
    padding:24px;
    margin-top:50px;
    font-size:0.9rem;
}
footer.bawah span{ color:var(--kuning); font-weight:700; }

</style>
</head>
